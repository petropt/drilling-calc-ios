name: DrillingCalc
options:
  bundleIdPrefix: com.groundworkanalytics
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
targets:
  DrillingCalc:
    type: application
    platform: iOS
    sources:
      - DrillingCalc
    settings:
      base:
        INFOPLIST_GENERATION_MODE: GeneratedFile
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_CFBundleDisplayName: "Drilling Calc"
        PRODUCT_BUNDLE_IDENTIFIER: com.groundworkanalytics.DrillingCalc
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
  DrillingCalcTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - DrillingCalcTests
    dependencies:
      - target: DrillingCalc
    settings:
      base:
        INFOPLIST_GENERATION_MODE: GeneratedFile
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/DrillingCalc.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/DrillingCalc"
        BUNDLE_LOADER: "$(TEST_HOST)"
        PRODUCT_BUNDLE_IDENTIFIER: com.groundworkanalytics.DrillingCalcTests
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
